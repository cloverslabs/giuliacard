<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Giulia Raffaeli - Innovation Manager at Clover Venture">
    <title>Giulia Raffaeli - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A1F1C 0%, #0D2B28 100%);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(13, 35, 32, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 191, 165, 0.15);
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .profile-image-container {
            margin-bottom: 2rem;
        }

        .profile-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00BFA5;
            box-shadow: 0 8px 32px rgba(0, 191, 165, 0.5);
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #FFFFFF;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #00BFA5;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .tagline {
            font-size: 0.95rem;
            font-weight: 400;
            font-style: italic;
            color: #A8B2D1;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
        }

        /* Contact Section */
        .contact-section {
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.3s forwards;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #6B7396;
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .section-title::before,
        .section-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 191, 165, 0.2), transparent);
        }

        .section-title::before {
            right: calc(100% + 16px);
        }

        .section-title::after {
            left: calc(100% + 16px);
        }

        .contact-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .contact-btn {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            text-decoration: none;
            color: #FFFFFF;
            background: rgba(13, 43, 40, 0.8);
            border: 1px solid rgba(0, 191, 165, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .contact-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 24px rgba(0, 191, 165, 0.3);
        }

        .contact-btn svg {
            width: 24px;
            height: 24px;
        }

        .phone-btn:hover {
            background: linear-gradient(135deg, #00695C, #00897B);
            border-color: #00BFA5;
        }

        .whatsapp-btn:hover {
            background: linear-gradient(135deg, #128C7E, #25D366);
            border-color: #25D366;
        }

        .email-btn:hover {
            background: linear-gradient(135deg, #00695C, #00897B);
            border-color: #00BFA5;
        }

        .linkedin-btn:hover {
            background: linear-gradient(135deg, #0A66C2, #0077B5);
            border-color: #0077B5;
        }

        .contact-info {
            margin-bottom: 2rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            color: #A8B2D1;
            font-size: 0.9rem;
            justify-content: center;
        }

        .info-item svg {
            color: #00BFA5;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .save-contact-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00897B, #00BFA5);
            color: #FFFFFF;
            border: none;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(0, 191, 165, 0.4);
        }

        .save-contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 191, 165, 0.6);
            background: linear-gradient(135deg, #00BFA5, #64FFDA);
        }

        .save-contact-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Ecosystem Section */
        .ecosystem-section {
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.6s forwards;
        }

        .ecosystem-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .ecosystem-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(13, 43, 40, 0.6);
            border: 1px solid rgba(0, 191, 165, 0.15);
            border-radius: 12px;
            text-decoration: none;
            color: #FFFFFF;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ecosystem-link:hover {
            background: rgba(13, 43, 40, 0.9);
            border-color: #00BFA5;
            transform: translateX(8px);
        }

        .ecosystem-link svg:first-child {
            color: #00BFA5;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .ecosystem-link span {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .ecosystem-link .arrow {
            color: #6B7396;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .ecosystem-link:hover .arrow {
            transform: translateX(4px);
            color: #00BFA5;
        }

        .share-btn {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #FFFFFF;
            border: 2px solid #00BFA5;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 1rem;
        }

        .share-btn:hover {
            background: #00BFA5;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 191, 165, 0.4);
        }

        .share-btn svg {
            width: 20px;
            height: 20px;
        }

        /* QR Code Section */
        .qr-toggle-btn {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #FFFFFF;
            border: 2px solid rgba(0, 191, 165, 0.5);
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .qr-toggle-btn:hover {
            border-color: #00BFA5;
            background: rgba(0, 191, 165, 0.08);
            transform: translateY(-2px);
        }

        .qr-toggle-btn svg {
            width: 20px;
            height: 20px;
        }

        .qr-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            margin-top: 1rem;
            background: rgba(13, 43, 40, 0.6);
            border: 1px solid rgba(0, 191, 165, 0.15);
            border-radius: 16px;
        }

        .qr-panel.visible {
            display: flex;
        }

        .qr-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #6B7396;
            text-transform: uppercase;
        }

        #qrcode {
            padding: 12px;
            background: #FFFFFF;
            border-radius: 12px;
            display: inline-block;
        }

        #qrcode img {
            display: block;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .footer-text {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #6B7396;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }
            .name {
                font-size: 1.75rem;
            }
            .contact-buttons {
                gap: 0.75rem;
            }
        }
    </style>
</head>

                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>
            </div>

            <button class="share-btn" onclick="shareProfile()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                CONDIVIDI PROFILO
            </button>

            <button class="qr-toggle-btn" onclick="toggleQR()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="3" height="3"></rect>
                    <rect x="18" y="14" width="3" height="3"></rect>
                    <rect x="14" y="18" width="3" height="3"></rect>
                    <rect x="18" y="18" width="3" height="3"></rect>
                </svg>
                MOSTRA QR CODE
            </button>

            <div class="qr-panel" id="qrPanel">
                <p class="qr-label">SCANNERIZZA PER CONNETTERTI</p>
                <div id="qrcode"></div>
            </div>
        </section>

    </div>

    <script>
        var qrGenerated = false;

        function toggleQR() {
            var panel = document.getElementById('qrPanel');
            var btn = document.querySelector('.qr-toggle-btn');
            var isVisible = panel.classList.contains('visible');

            if (isVisible) {
                panel.classList.remove('visible');
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="3" height="3"></rect><rect x="18" y="14" width="3" height="3"></rect><rect x="14" y="18" width="3" height="3"></rect><rect x="18" y="18" width="3" height="3"></rect></svg> MOSTRA QR CODE`;
            } else {
                panel.classList.add('visible');
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="3" height="3"></rect><rect x="18" y="14" width="3" height="3"></rect><rect x="14" y="18" width="3" height="3"></rect><rect x="18" y="18" width="3" height="3"></rect></svg> NASCONDI QR CODE`;
                if (!qrGenerated) {
                    new QRCode(document.getElementById("qrcode"), {
                        text: window.location.href,
                        width: 160,
                        height: 160,
                        colorDark: "#0D2B28",
                        colorLight: "#FFFFFF",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    qrGenerated = true;
                }
            }
        }

        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Giulia Raffaeli
N:Raffaeli;Giulia;;;
TITLE:Innovation Manager
ORG:Clover Venture
TEL;TYPE=CELL:+3933219869
EMAIL:giulia@cloverventure.it
URL:https://www.linkedin.com/in/giulia-raffaeli-18b837244/
END:VCARD`;
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Giulia_Raffaeli_Clover_Venture.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            showNotification('Contatto salvato! Controlla i download.');
        }

        async function shareProfile() {
            const shareData = {
                title: 'Giulia Raffaeli - Innovation Manager Clover Venture',
                text: 'Hyperconnecting Europe - Redefining Access to Innovation',
                url: window.location.href
            };
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    if (err.name !== 'AbortError') copyToClipboard();
                }
            } else {
                copyToClipboard();
            }
        }

        function copyToClipboard() {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    showNotification('Link copiato negli appunti!');
                });
            }
        }

        function showNotification(message) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed; bottom: 24px; left: 50%;
                transform: translateX(-50%) translateY(100px);
                background: linear-gradient(135deg, #00897B, #00BFA5);
                color: white; padding: 16px 24px; border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0,191,165,0.5);
                font-size: 0.9rem; font-weight: 600;
                z-index: 1000; transition: transform 0.4s ease;
                font-family: 'Inter', sans-serif;
            `;
            document.body.appendChild(notification);
            setTimeout(() => { notification.style.transform = 'translateX(-50%) translateY(0)'; }, 50);
            setTimeout(() => {
                notification.style.transform = 'translateX(-50%) translateY(100px)';
                setTimeout(() => { notification.remove(); }, 400);
            }, 3000);
        }
    </script>
</body>
</html>
